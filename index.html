<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>.</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#1e1e1e; color:#ccc; font-family:'Segoe UI',system-ui,sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  /* Top bar */
  #topbar { height:40px; background:#2d2d2d; border-bottom:1px solid #111; display:flex; align-items:center; padding:0 12px; gap:10px; flex-shrink:0; }
  #topbar .filepath { flex:1; font-size:0.8rem; color:#888; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #topbar button { padding:4px 14px; border:none; border-radius:4px; cursor:pointer; font-size:0.8rem; }
  #btnSave   { background:#0e6416; color:#fff; }
  #btnSave:hover { background:#1a7a20; }
  #btnTerm   { background:#333; color:#aaa; font-family:monospace; letter-spacing:0.5px; }
  #btnTerm:hover, #btnTerm.active { background:#007acc; color:#fff; }
  #btnLogout { background:#333; color:#aaa; }
  #btnLogout:hover { background:#444; color:#fff; }

  /* Layout */
  #body { display:flex; flex:1; overflow:hidden; }

  /* Sidebar */
  #sidebar { width:220px; background:#252526; border-right:1px solid #111; display:flex; flex-direction:column; overflow:hidden; flex-shrink:0; }
  #sidebar-header { padding:8px 12px; font-size:0.7rem; color:#888; text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid #111; display:flex; align-items:center; justify-content:space-between; }
  #sidebar-actions { display:flex; gap:8px; }
  #sidebar-actions span { cursor:pointer; color:#555; font-size:1.1rem; line-height:1; }
  #sidebar-actions span:hover { color:#ccc; }
  #filetree { flex:1; overflow-y:auto; padding:4px 0; scrollbar-width:thin; scrollbar-color:#444 transparent; }
  .tree-loading { padding:12px; font-size:0.8rem; color:#666; }
  .tree-err { padding:12px; font-size:0.8rem; color:#f85149; line-height:1.5; }
  .tree-err small { color:#c0392b; word-break:break-all; }

  /* Tree */
  .tree-item { display:flex; align-items:center; gap:5px; padding:3px 8px; cursor:pointer; font-size:0.82rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; user-select:none; }
  .tree-item:hover { background:#2a2d2e; }
  .tree-item.active { background:#094771; color:#fff; }
  .tree-item .icon { flex-shrink:0; font-size:0.7rem; width:10px; text-align:center; font-style:normal; }
  .tree-folder > .folder-children { display:none; }
  .tree-folder.open > .folder-children { display:block; }

  /* Main: editor + terminal stacked */
  #main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
  #editor-wrap { flex:1; overflow:hidden; min-height:60px; }
  #editor { width:100%; height:100%; }

  /* Terminal resize handle */
  #term-handle { height:4px; background:#111; cursor:row-resize; flex-shrink:0; border-top:1px solid #0a0a0a; display:none; }
  #term-handle:hover, #term-handle.dragging { background:#007acc; }

  /* Terminal panel */
  #terminal { height:220px; background:#0d0d0d; display:none; flex-direction:column; flex-shrink:0; overflow:hidden; }
  #terminal.open { display:flex; }
  #term-handle.open { display:block; }

  #term-titlebar { height:30px; background:#1a1a1a; border-bottom:1px solid #111; display:flex; align-items:center; padding:0 12px; font-size:0.7rem; color:#666; text-transform:uppercase; letter-spacing:1px; flex-shrink:0; gap:8px; user-select:none; }
  #term-titlebar .close-btn { margin-left:auto; cursor:pointer; color:#555; font-size:0.9rem; padding:2px 6px; border-radius:3px; }
  #term-titlebar .close-btn:hover { background:#333; color:#ccc; }

  #term-output { flex:1; overflow-y:auto; padding:8px 12px; font-family:'Cascadia Code','Fira Code',Consolas,monospace; font-size:0.82rem; line-height:1.5; white-space:pre-wrap; word-break:break-all; scrollbar-width:thin; scrollbar-color:#333 transparent; }
  .t-cmd  { color:#0d9461; }
  .t-out  { color:#ccc; }
  .t-err  { color:#f85149; }
  .t-info { color:#666; font-style:italic; }

  #term-input-row { display:flex; align-items:center; padding:5px 12px 8px; gap:8px; flex-shrink:0; border-top:1px solid #1a1a1a; }
  #term-prompt { font-family:'Cascadia Code',Consolas,monospace; font-size:0.82rem; color:#0d9461; flex-shrink:0; }
  #term-input { flex:1; background:transparent; border:none; outline:none; color:#e6edf3; font-family:'Cascadia Code','Fira Code',Consolas,monospace; font-size:0.82rem; caret-color:#e6edf3; }
  #term-input::placeholder { color:#444; }

  /* Status bar */
  #statusbar { height:22px; background:#007acc; display:flex; align-items:center; padding:0 12px; font-size:0.72rem; color:#fff; gap:16px; flex-shrink:0; }

  /* Context menu */
  #ctxmenu { position:fixed; background:#252526; border:1px solid #454545; border-radius:4px; z-index:9999; min-width:150px; display:none; font-size:0.82rem; box-shadow:0 4px 12px rgba(0,0,0,.5); }
  #ctxmenu div { padding:7px 16px; cursor:pointer; color:#ccc; }
  #ctxmenu div:hover { background:#094771; color:#fff; }
  #ctxmenu hr { border:none; border-top:1px solid #454545; margin:2px 0; }

  /* Modal */
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:10000; display:flex; align-items:center; justify-content:center; }
  .modal { background:#252526; border:1px solid #454545; border-radius:8px; padding:24px; width:320px; }
  .modal h3 { margin-bottom:14px; font-size:0.95rem; color:#e6edf3; }
  .modal input { width:100%; background:#1e1e1e; border:1px solid #454545; border-radius:4px; color:#ccc; padding:8px 10px; font-size:0.85rem; outline:none; }
  .modal input:focus { border-color:#388bfd; }
  .modal-btns { display:flex; gap:8px; margin-top:14px; justify-content:flex-end; }
  .modal-btns button { padding:6px 16px; border:none; border-radius:4px; cursor:pointer; font-size:0.82rem; }
  .btn-ok { background:#238636; color:#fff; }
  .btn-cancel { background:#333; color:#aaa; }
</style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
  <span class="filepath" id="filepath">No file open</span>
  <button id="btnSave"   onclick="saveFile()">Save</button>
  <button id="btnTerm"   onclick="toggleTerm()" title="Toggle terminal  Ctrl+`">⌨ Terminal</button>
  <button id="btnLogout" onclick="doLogout()">Logout</button>
</div>

<!-- Body -->
<div id="body">

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">
      EXPLORER
      <div id="sidebar-actions">
        <span title="New file"   onclick="promptCreate('file')">+</span>
        <span title="New folder" onclick="promptCreate('folder')">&#x1F4C1;</span>
      </div>
    </div>
    <div id="filetree">Loading…</div>
  </div>

  <!-- Main area: editor + terminal -->
  <div id="main">
    <div id="editor-wrap"><div id="editor"></div></div>
    <div id="term-handle"></div>
    <div id="terminal">
      <div id="term-titlebar">
        ⌨ &nbsp;TERMINAL
        <span class="close-btn" onclick="toggleTerm()" title="Close">✕</span>
      </div>
      <div id="term-output"></div>
      <div id="term-input-row">
        <span id="term-prompt">❯</span>
        <input id="term-input" type="text" autocomplete="off" spellcheck="false" placeholder="php artisan build:optimize …">
      </div>
    </div>
  </div>

</div>

<!-- Status bar -->
<div id="statusbar">
  <span id="st-lang">—</span>
  <span id="st-pos">Ln 1, Col 1</span>
  <span>UTF-8</span>
</div>

<!-- Context menu -->
<div id="ctxmenu" onmousedown="event.stopPropagation()">
  <div onmousedown="ctxAction('newfile')">New File</div>
  <div onmousedown="ctxAction('newfolder')">New Folder</div>
  <hr>
  <div onmousedown="ctxAction('rename')">Rename</div>
  <div onmousedown="ctxAction('delete')" style="color:#f85149">Delete</div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modalBg" style="display:none">
  <div class="modal">
    <h3 id="modalTitle">Name</h3>
    <input type="text" id="modalInput">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-ok"     onclick="confirmModal()">OK</button>
    </div>
  </div>
</div>

<!-- Monaco -->
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
<script>
// window.__env is injected by the server before this page loads
const API  = window.__env;
const CSRF = API.csrf;
let editor, currentFile = null, ctxTarget = null, modalCb = null;

// ── Boot Monaco ───────────────────────────────────────────────────────────────
require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
require(['vs/editor/editor.main'], () => {
  editor = monaco.editor.create(document.getElementById('editor'), {
    theme: 'vs-dark', language: 'plaintext', fontSize: 14, tabSize: 4,
    minimap: { enabled: true }, wordWrap: 'off', automaticLayout: true,
    scrollBeyondLastLine: false, renderWhitespace: 'selection',
    fontFamily: "'Cascadia Code','Fira Code',Consolas,monospace", fontLigatures: true,
  });
  editor.onDidChangeCursorPosition(e =>
    document.getElementById('st-pos').textContent = `Ln ${e.position.lineNumber}, Col ${e.position.column}`
  );
  editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, saveFile);
  loadTree();
});

// ── File tree ─────────────────────────────────────────────────────────────────
async function loadTree() {
  const el = document.getElementById('filetree');
  el.innerHTML = '<div class="tree-loading">Loading…</div>';
  try {
    const res = await fetch(API.files);
    if (!res.ok) {
      const txt = await res.text();
      el.innerHTML = `<div class="tree-err">Error ${res.status}<br><small>${txt.substring(0,200)}</small></div>`;
      return;
    }
    const data = await res.json();
    el.innerHTML = '';
    if (!data.length) {
      el.innerHTML = '<div class="tree-loading">No files found.</div>';
      return;
    }
    renderTree(data, el, 0);
  } catch (err) {
    el.innerHTML = `<div class="tree-err">Failed to load:<br><small>${err.message}</small></div>`;
  }
}

function renderTree(items, container, depth) {
  items.forEach(item => {
    const el = document.createElement('div');
    el.dataset.path = item.path;
    if (item.type === 'folder') {
      el.className = 'tree-folder';
      const header = document.createElement('div');
      header.className = 'tree-item';
      header.style.paddingLeft = (8 + depth * 14) + 'px';
      header.innerHTML = `<i class="icon">&#x25B6;</i><span>📁 ${item.name}</span>`;
      header.addEventListener('click', e => {
        e.stopPropagation();
        el.classList.toggle('open');
        header.querySelector('.icon').textContent = el.classList.contains('open') ? '▼' : '▶';
      });
      header.addEventListener('contextmenu', e => showCtx(e, item));
      const children = document.createElement('div');
      children.className = 'folder-children';
      renderTree(item.children || [], children, depth + 1);
      el.appendChild(header);
      el.appendChild(children);
    } else {
      el.className = 'tree-item tree-file';
      el.style.paddingLeft = (8 + depth * 14) + 'px';
      el.innerHTML = `<i class="icon"></i><span>${fileIcon(item.name)} ${item.name}</span>`;
      el.addEventListener('click', e => { e.stopPropagation(); openFile(item.path, el); });
      el.addEventListener('contextmenu', e => showCtx(e, item));
    }
    container.appendChild(el);
  });
}

function fileIcon(n) {
  const e = n.split('.').pop().toLowerCase();
  return {php:'🐘',js:'📜',ts:'📘',vue:'💚',css:'🎨',scss:'🎨',json:'📋',
          md:'📝',html:'🌐',blade:'🔪',env:'⚙️',sh:'💻',sql:'🗄️',yml:'⚙️'}[e] || '📄';
}

// ── Open file ─────────────────────────────────────────────────────────────────
async function openFile(path, el) {
  document.querySelectorAll('.tree-file.active').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('filepath').textContent = path + '  (loading…)';
  try {
    const res  = await fetch(API.read + '?path=' + encodeURIComponent(path));
    if (!res.ok) {
      document.getElementById('filepath').textContent = 'Error ' + res.status;
      return;
    }
    const data = await res.json();
    if (data.error) { document.getElementById('filepath').textContent = data.error; return; }
    currentFile = data.path;
    document.getElementById('filepath').textContent = data.path;
    document.getElementById('st-lang').textContent  = data.language.toUpperCase();
    editor.setModel(monaco.editor.createModel(data.content, data.language));
    editor.focus();
  } catch (err) {
    document.getElementById('filepath').textContent = 'Failed: ' + err.message;
  }
}

// ── Save ──────────────────────────────────────────────────────────────────────
async function saveFile() {
  if (!currentFile) return;
  const btn = document.getElementById('btnSave');
  btn.textContent = 'Saving…';
  const res  = await fetch(API.write, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-CSRF-TOKEN': CSRF },
    body: JSON.stringify({ path: currentFile, content: editor.getValue() }),
  });
  const data = await res.json();
  btn.textContent = data.ok ? 'Saved ✓' : 'Error ✗';
  setTimeout(() => btn.textContent = 'Save', 1600);
}

// ── Logout ────────────────────────────────────────────────────────────────────
async function doLogout() {
  await fetch(API.logout, { method: 'POST', headers: { 'X-CSRF-TOKEN': CSRF } });
  location.reload();
}

// ── Terminal ──────────────────────────────────────────────────────────────────
const termHistory = [];
let termHistIdx = -1;

function termOut() { return document.getElementById('term-output'); }
function termInp() { return document.getElementById('term-input'); }

function termPrint(text, cls) {
  if (!text) return;
  const el = document.createElement('div');
  el.className = cls || 't-out';
  el.textContent = text;
  termOut().appendChild(el);
  termOut().scrollTop = termOut().scrollHeight;
}

function stripAnsi(s) {
  return s.replace(/\x1B\[[0-9;]*[A-Za-z]/g, '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
}

termInp().addEventListener('keydown', async e => {
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (termHistIdx < termHistory.length - 1) {
      termHistIdx++;
      termInp().value = termHistory[termHistory.length - 1 - termHistIdx];
    }
    return;
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (termHistIdx > 0) {
      termHistIdx--;
      termInp().value = termHistory[termHistory.length - 1 - termHistIdx];
    } else {
      termHistIdx = -1;
      termInp().value = '';
    }
    return;
  }
  if (e.key !== 'Enter') return;

  const cmd = termInp().value.trim();
  termInp().value = '';
  termHistIdx = -1;
  if (!cmd) return;

  // Handle clear locally
  if (cmd === 'clear' || cmd === 'cls') { termOut().innerHTML = ''; return; }

  termHistory.push(cmd);
  termPrint('❯  ' + cmd, 't-cmd');

  try {
    const res  = await fetch(API.terminal, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRF-TOKEN': CSRF },
      body: JSON.stringify({ cmd }),
    });
    const data = await res.json();
    const out  = stripAnsi(data.output || '').trimEnd();
    if (out) termPrint(out, data.code !== 0 ? 't-err' : 't-out');
    if (data.code !== 0 && !out) termPrint('Exit code: ' + data.code, 't-info');
  } catch (err) {
    termPrint('Request failed: ' + err.message, 't-err');
  }
});

// Toggle terminal open/close
function toggleTerm() {
  const term   = document.getElementById('terminal');
  const handle = document.getElementById('term-handle');
  const btn    = document.getElementById('btnTerm');
  const isOpen = term.classList.toggle('open');
  handle.classList.toggle('open', isOpen);
  btn.classList.toggle('active', isOpen);
  if (isOpen) setTimeout(() => termInp().focus(), 50);
}

// Ctrl+` to toggle
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === '`') { e.preventDefault(); toggleTerm(); }
});

// ── Terminal resize drag ──────────────────────────────────────────────────────
(function () {
  const handle = document.getElementById('term-handle');
  const term   = document.getElementById('terminal');
  let dragging = false, startY = 0, startH = 0;

  handle.addEventListener('mousedown', e => {
    if (!term.classList.contains('open')) return;
    dragging = true;
    startY = e.clientY;
    startH = term.offsetHeight;
    handle.classList.add('dragging');
    document.body.style.cursor     = 'row-resize';
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const newH = Math.max(80, Math.min(startH + (startY - e.clientY), window.innerHeight - 120));
    term.style.height = newH + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.cursor     = '';
    document.body.style.userSelect = '';
  });
})();

// ── Context menu ──────────────────────────────────────────────────────────────
function showCtx(e, item) {
  e.preventDefault();
  ctxTarget = item;
  const m = document.getElementById('ctxmenu');
  m.style.display = 'block';
  m.style.left = e.clientX + 'px';
  m.style.top  = e.clientY + 'px';
}
document.addEventListener('mousedown', e => {
  if (!e.target.closest('#ctxmenu')) document.getElementById('ctxmenu').style.display = 'none';
});

function ctxAction(action) {
  document.getElementById('ctxmenu').style.display = 'none';
  if (!ctxTarget) return;
  if (action === 'newfile')   { promptCreate('file',   ctxTarget); return; }
  if (action === 'newfolder') { promptCreate('folder', ctxTarget); return; }
  if (action === 'rename') {
    openModal('Rename', ctxTarget.name, async name => {
      if (!name || name === ctxTarget.name) return;
      const dir = ctxTarget.path.split('/').slice(0, -1).join('/');
      const to  = (dir ? dir + '/' : '') + name;
      const res = await fetch(API.rename, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRF-TOKEN': CSRF },
        body: JSON.stringify({ from: ctxTarget.path, to }),
      });
      const d = await res.json();
      if (d.error) { alert(d.error); return; }
      if (currentFile === ctxTarget.path) {
        currentFile = to;
        document.getElementById('filepath').textContent = to;
      }
      loadTree();
    });
  }
  if (action === 'delete') {
    if (!confirm(`Delete "${ctxTarget.name}"?`)) return;
    fetch(API.delete, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRF-TOKEN': CSRF },
      body: JSON.stringify({ path: ctxTarget.path }),
    }).then(() => loadTree());
  }
}

// ── Create ────────────────────────────────────────────────────────────────────
function promptCreate(type, parent) {
  openModal(type === 'file' ? 'New file name' : 'New folder name', '', async name => {
    if (!name) return;
    const base = parent
      ? (parent.type === 'folder' ? parent.path : parent.path.split('/').slice(0, -1).join('/'))
      : '';
    await fetch(API.create, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRF-TOKEN': CSRF },
      body: JSON.stringify({ path: (base ? base + '/' : '') + name, type }),
    });
    loadTree();
  });
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(title, val, cb) {
  modalCb = cb;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalInput').value = val;
  document.getElementById('modalBg').style.display = 'flex';
  setTimeout(() => document.getElementById('modalInput').select(), 50);
}
function confirmModal() {
  const v = document.getElementById('modalInput').value.trim();
  closeModal();
  if (modalCb) modalCb(v);
}
function closeModal() {
  document.getElementById('modalBg').style.display = 'none';
  modalCb = null;
}
document.getElementById('modalInput').addEventListener('keydown', e => {
  if (e.key === 'Enter')  confirmModal();
  if (e.key === 'Escape') closeModal();
});
</script>
</body>
</html>
